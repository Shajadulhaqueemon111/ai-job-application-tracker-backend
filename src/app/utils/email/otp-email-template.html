<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OTP Verification</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0b1220;
        font-family: Arial, sans-serif;
      }

      .wrapper {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background: linear-gradient(145deg, #0f172a, #111c33);
        border-radius: 16px;
        text-align: center;
        color: #fff;
        box-shadow: 0 0 25px rgba(56, 189, 248, 0.15);
      }

      /* glowing logo animation feel */
      .logo {
        font-size: 22px;
        font-weight: bold;
        color: #38bdf8;
        letter-spacing: 3px;
        animation: glow 2s infinite;
      }

      @keyframes glow {
        0% {
          text-shadow: 0 0 5px #38bdf8;
        }
        50% {
          text-shadow: 0 0 20px #38bdf8;
        }
        100% {
          text-shadow: 0 0 5px #38bdf8;
        }
      }

      .title {
        font-size: 20px;
        margin-top: 15px;
      }

      .subtitle {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 25px;
      }

      /* OTP animated box */
      .otp {
        display: inline-block;
        font-size: 34px;
        letter-spacing: 10px;
        font-weight: bold;
        padding: 15px 25px;
        border-radius: 12px;
        background: linear-gradient(90deg, #38bdf8, #a78bfa, #38bdf8);
        background-size: 200% 200%;
        color: #0b1220;

        animation: slideGlow 2s infinite ease-in-out;
      }

      @keyframes slideGlow {
        0% {
          background-position: 0% 50%;
          transform: scale(1);
        }
        50% {
          background-position: 100% 50%;
          transform: scale(1.05);
        }
        100% {
          background-position: 0% 50%;
          transform: scale(1);
        }
      }

      .footer {
        margin-top: 25px;
        font-size: 12px;
        color: #64748b;
        line-height: 1.6;
      }

      .pulse-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #38bdf8;
        border-radius: 50%;
        margin-left: 5px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.8);
          opacity: 0.5;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="logo">AI JOB TRACKER <span class="pulse-dot"></span></div>

      <div class="title">Verification Code</div>
      <div class="subtitle">Use this OTP to continue your login</div>

      <div class="otp">{{OTP}}</div>

      <div class="footer">
        This OTP will expire in <b>10 minutes</b>.<br />
        If you didn’t request this code, ignore this email.
      </div>
    </div>
  </body>
</html>
